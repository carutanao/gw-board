<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GW 愚痴板 2025</title>
  <link href="https://fonts.googleapis.com/css2?family=Kaisei+Decol:wght@400;700&family=Noto+Sans+JP:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #faf7f2;
      --surface: #ffffff;
      --border: #e8e2d9;
      --text: #1a1714;
      --muted: #9a9188;
      --accent: #d4522a;
      --accent-light: #fdf0eb;
      --tag-bg: #f0ebe3;
    }

    body {
      background: var(--bg);
      font-family: 'Noto Sans JP', sans-serif;
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 4rem;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 1.5rem 1rem;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    header h1 {
      font-family: 'Kaisei Decol', serif;
      font-size: clamp(1.4rem, 5vw, 2rem);
      color: var(--text);
      letter-spacing: 0.05em;
    }

    header h1 span { color: var(--accent); }
    header p { font-size: 12px; color: var(--muted); margin-top: 4px; }

    .container { max-width: 640px; margin: 0 auto; padding: 0 1rem; }

    .post-form {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.25rem;
      margin: 1.5rem 0;
    }

    .post-form textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 14px;
      color: var(--text);
      background: var(--bg);
      resize: none;
      outline: none;
      transition: border-color 0.2s;
      line-height: 1.7;
    }

    .post-form textarea:focus { border-color: var(--accent); }
    .post-form textarea::placeholder { color: var(--muted); }

    .form-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 10px;
      gap: 10px;
      flex-wrap: wrap;
    }

    .category-select {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 10px;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 13px;
      color: var(--text);
      background: var(--bg);
      outline: none;
      cursor: pointer;
    }

    .submit-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 8px 20px;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      letter-spacing: 0.05em;
    }

    .submit-btn:hover { opacity: 0.88; }
    .submit-btn:active { transform: scale(0.97); }
    .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1rem; }

    .filter-btn {
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      border-radius: 100px;
      padding: 5px 14px;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    .posts-list { display: flex; flex-direction: column; gap: 12px; }

    .post-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.1rem 1.25rem;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .post-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }

    .category-tag {
      background: var(--tag-bg);
      color: var(--accent);
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 100px;
      font-weight: 500;
    }

    .post-time { font-size: 11px; color: var(--muted); margin-left: auto; }
    .post-content { font-size: 14px; line-height: 1.75; color: var(--text); word-break: break-all; }
    .post-footer { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }

    .reaction-btn {
      border: 1px solid var(--border);
      background: var(--bg);
      border-radius: 100px;
      padding: 4px 12px;
      font-size: 12px;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
      font-family: 'Noto Sans JP', sans-serif;
    }

    .reaction-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
    .reaction-btn.reacted { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }

    .loading, .empty { text-align: center; padding: 3rem 1rem; color: var(--muted); font-size: 14px; }

    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--text);
      color: #fff;
      padding: 10px 20px;
      border-radius: 100px;
      font-size: 13px;
      opacity: 0;
      transition: all 0.3s;
      pointer-events: none;
      z-index: 999;
      white-space: nowrap;
    }

    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<header>
  <h1>🎏 GW<span>愚痴</span>板 2025</h1>
  <p>今年のGWの出来事や愚痴を匿名で投稿しよう</p>
</header>

<div class="container">

  <div class="post-form">
    <textarea id="post-input" rows="3" placeholder="今年のGWはどうだった？愚痴でも出来事でも何でもどうぞ…"></textarea>
    <div class="form-footer">
      <select class="category-select" id="category-select">
        <option value="愚痴">😤 愚痴</option>
        <option value="出来事">📅 出来事</option>
        <option value="あるある">🤝 あるある</option>
        <option value="良かったこと">✨ 良かったこと</option>
      </select>
      <button class="submit-btn" id="submit-btn" onclick="submitPost()">投稿する</button>
    </div>
  </div>

  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('all', this)">すべて</button>
    <button class="filter-btn" onclick="setFilter('愚痴', this)">😤 愚痴</button>
    <button class="filter-btn" onclick="setFilter('出来事', this)">📅 出来事</button>
    <button class="filter-btn" onclick="setFilter('あるある', this)">🤝 あるある</button>
    <button class="filter-btn" onclick="setFilter('良かったこと', this)">✨ 良かったこと</button>
  </div>

  <div class="posts-list" id="posts-list">
    <div class="loading">読み込み中...</div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
  const SUPABASE_URL = 'https://rkeqibokkozwiiiyphbk.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJrZXFpYm9ra296d2lpaXlwaGJrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4NzcyOTQsImV4cCI6MjA5MzQ1MzI5NH0.vonmqpcYWxuUgDsshBRY8fN99o5EahNCAz302XMERw0';

  let allPosts = [];
  let currentFilter = 'all';
  const reacted = new Set(JSON.parse(localStorage.getItem('reacted') || '[]'));

  async function api(path, options = {}) {
    const headers = {
      'Content-Type': 'application/json',
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
    };
    if (options.prefer) headers['Prefer'] = options.prefer;

    const res = await fetch(SUPABASE_URL + '/rest/v1/' + path, {
      headers,
      ...options
    });
    if (!res.ok) throw new Error(await res.text());
    return (res.status === 204 || res.status === 201) ? null : res.json();
  }

  async function loadPosts() {
    try {
      const posts = await api('posts?select=*&order=created_at.desc');
      allPosts = posts;
      renderPosts();
    } catch (e) {
      document.getElementById('posts-list').innerHTML = '<div class="empty">読み込みに失敗しました😢<br>URLとKeyの設定を確認してください</div>';
      console.error(e);
    }
  }

  function renderPosts() {
    const list = document.getElementById('posts-list');
    const filtered = currentFilter === 'all' ? allPosts : allPosts.filter(p => p.category === currentFilter);
    if (filtered.length === 0) {
      list.innerHTML = '<div class="empty">まだ投稿がありません。最初の一言をどうぞ！</div>';
      return;
    }
    list.innerHTML = filtered.map(p => postHTML(p)).join('');
  }

  function postHTML(p) {
    const reactions = p.reactions || { 'わかる': 0, 'つらい': 0, '笑った': 0 };
    const time = new Date(p.created_at).toLocaleString('ja-JP', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' });
    const icons = { 'わかる': '👍', 'つらい': '😢', '笑った': '😂' };
    const btns = Object.entries(reactions).map(([k, v]) => {
      const done = reacted.has(p.id + '_' + k);
      return `<button class="reaction-btn ${done ? 'reacted' : ''}" onclick="react('${p.id}','${k}')">${icons[k] || ''} ${k} ${v}</button>`;
    }).join('');
    return `<div class="post-card" id="post-${p.id}">
      <div class="post-header">
        <span class="category-tag">${p.category || '投稿'}</span>
        <span class="post-time">${time}</span>
      </div>
      <div class="post-content">${escHtml(p.content)}</div>
      <div class="post-footer">${btns}</div>
    </div>`;
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
  }

  async function submitPost() {
    const content = document.getElementById('post-input').value.trim();
    const category = document.getElementById('category-select').value;
    if (!content) { showToast('内容を入力してください'); return; }
    if (content.length > 200) { showToast('200文字以内で入力してください'); return; }

    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.textContent = '投稿中...';

    try {
      await api('posts', {
        method: 'POST',
        prefer: 'return=minimal',
        body: JSON.stringify({ content, category })
      });
      document.getElementById('post-input').value = '';
      showToast('投稿しました！');
      await loadPosts();
    } catch (e) {
      showToast('投稿に失敗しました😢');
      console.error(e);
    }

    btn.disabled = false;
    btn.textContent = '投稿する';
  }

  async function react(postId, key) {
    const rKey = postId + '_' + key;
    if (reacted.has(rKey)) return;

    const post = allPosts.find(p => p.id === postId);
    if (!post) return;

    const reactions = { ...post.reactions };
    reactions[key] = (reactions[key] || 0) + 1;

    try {
      await api('posts?id=eq.' + postId, {
        method: 'PATCH',
        prefer: 'return=minimal',
        body: JSON.stringify({ reactions })
      });
      reacted.add(rKey);
      localStorage.setItem('reacted', JSON.stringify([...reacted]));
      post.reactions = reactions;
      renderPosts();
    } catch (e) {
      showToast('リアクションに失敗しました');
    }
  }

  function setFilter(filter, btn) {
    currentFilter = filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderPosts();
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  loadPosts();
  setInterval(loadPosts, 30000);
</script>
</body>
</html>
